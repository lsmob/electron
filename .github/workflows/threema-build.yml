          "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
        ELECTRON_DEPOT_TOOLS_WIN_TOOLCHAIN=0 \
        DEPOT_TOOLS_WIN_TOOLCHAIN=0 \
        ELECTRON_USE_THREE_WAY_MERGE_FOR_PATCHES=1 \
          e d gclient sync --with_branch_heads --with_tags

    - name: Init build configuration
      run: |
        if [ -n "${ENGFLOW_CREDENTIAL_JSON:-}" ]; then
          echo "EngFlow credentials present — routing reclient to EngFlow RBE"
          ENGFLOW_CREDS="/tmp/engflow-creds.json"
          echo "$ENGFLOW_CREDENTIAL_JSON" > "$ENGFLOW_CREDS"
          # RBE_* env vars override whatever configure_reclient_cfgs.py wrote.
          # TODO: replace both placeholders once your EngFlow account is set up.
          export RBE_server_address="grpcs://PLACEHOLDER.cluster.engflow.com:443"
          export RBE_instance="PLACEHOLDER_ENGFLOW_INSTANCE"
          export RBE_credential_file="$ENGFLOW_CREDS"
          {
            echo "RBE_server_address=grpcs://PLACEHOLDER.cluster.engflow.com:443"
            echo "RBE_instance=PLACEHOLDER_ENGFLOW_INSTANCE"
            echo "RBE_credential_file=$ENGFLOW_CREDS"
          } >> "$GITHUB_ENV"
        fi

        e init -f --root=$(pwd) --out=Default \
          "$GN_BUILD_TYPE" --import "$GN_BUILD_TYPE" \
          --target-cpu "$TARGET_ARCH" \
          --remote-build siso

    - name: Run Electron-only hooks
      run: |
        e d gclient runhooks --spec="solutions=[{'name':'src/electron','url':None,'deps_file':'DEPS','custom_vars':{'process_deps':False},'managed':False}]"

    - name: Add CHROMIUM_BUILDTOOLS_PATH
      run: echo "CHROMIUM_BUILDTOOLS_PATH=$(pwd)/src/buildtools" >> $GITHUB_ENV

    - name: Install yarn dependencies
      uses: ./src/electron/.github/actions/install-dependencies

    - name: Build Electron
      run: |
        cd src/electron && git pack-refs && cd ../..
        cd src && e d gn clean out/Default 2>/dev/null || true && cd ..
        if [ "$GN_BUILD_TYPE" = "release" ]; then
          NINJA_SUMMARIZE_BUILD=1 e build --target electron:release_build
        else
          NINJA_SUMMARIZE_BUILD=1 e build --target electron:testing_build
        fi

    - name: Build Chromedriver
      run: |
        cd src
        e build --target electron:electron_chromedriver_zip

    - name: Upload dist artifacts
      if: always() && !cancelled()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: electron-linux-arm64
        path: |
          src/out/Default/dist.zip
          src/out/Default/chromedriver.zip

# ──────────────────────────────────────────────────────────────────────────────
# macOS arm64  (native on M-series runner)
# ──────────────────────────────────────────────────────────────────────────────
  macos-arm64:
    name: 'macOS / arm64'
    # workflow_dispatch only — no macOS runner on push until runner is available
    if: ${{ github.repository == 'lsmob/electron' && github.event_name == 'workflow_dispatch' && inputs.build-macos-arm64 }}
    runs-on: [self-hosted, macOS, X64]
    env:
      TARGET_ARCH: arm64
      TARGET_PLATFORM: macos
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_mac=True --custom-var=host_os=mac'
      GN_BUILD_TYPE: ${{ inputs.gn-build-type || 'testing' }}
      ENGFLOW_CREDENTIAL_JSON: ${{ secrets.ENGFLOW_CREDENTIAL_JSON }}

      CHROMIUM_GIT_COOKIE: ${{ secrets.CHROMIUM_GIT_COOKIE }}

    steps:
    - name: Free up disk space (pre-checkout)
      run: |
        sudo rm -rf /Library/Developer/CoreSimulator || true
        sudo rm -rf ~/Library/Developer/CoreSimulator || true
        sudo rm -rf /Applications/Xcode_16.1.app /Applications/Xcode_16.2.app /Applications/Xcode_16.3.app || true
        sudo rm -rf /Applications/Safari.app "/Applications/Google Chrome.app" /Applications/Firefox.app || true
        sudo rm -rf /Users/runner/.dotnet /Users/runner/.rustup /Users/runner/Library/Android || true
        df -h

    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        fetch-depth: 0

    - name: Free up disk space (post-checkout, uses action)
      uses: ./src/electron/.github/actions/free-space-macos

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 22.21.x
        cache: yarn
        cache-dependency-path: src/electron/yarn.lock


    - name: Set GN_EXTRA_ARGS for macOS arm64 cross-compilation
      run: |
        # Intel host → arm64 target. No v8_snapshot_toolchain override needed
        # because the snapshot generator runs natively on the x64 host.
        echo "GN_EXTRA_ARGS=target_cpu=\"arm64\"" >> $GITHUB_ENV

    - name: Set Chromium Git Cookie
      uses: ./src/electron/.github/actions/set-chromium-cookie

    - name: Install Build Tools
      uses: ./src/electron/.github/actions/install-build-tools

    - name: Sync Chromium source and apply patches
      run: |
        e d gclient config \
          --name "src/electron" \
          --unmanaged \
          $GCLIENT_EXTRA_ARGS \
          "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
        ELECTRON_DEPOT_TOOLS_WIN_TOOLCHAIN=0 \
        DEPOT_TOOLS_WIN_TOOLCHAIN=0 \
        ELECTRON_USE_THREE_WAY_MERGE_FOR_PATCHES=1 \
          e d gclient sync --with_branch_heads --with_tags

    - name: Fix platform-specific binaries after sync
      uses: ./src/electron/.github/actions/fix-sync
      with:
        target-platform: macos
      env:
        TARGET_ARCH: arm64

    - name: Init build configuration
      run: |
        if [ -n "${ENGFLOW_CREDENTIAL_JSON:-}" ]; then
          echo "EngFlow credentials present — routing reclient to EngFlow RBE"
          ENGFLOW_CREDS="/tmp/engflow-creds.json"
          echo "$ENGFLOW_CREDENTIAL_JSON" > "$ENGFLOW_CREDS"
          # RBE_* env vars override whatever configure_reclient_cfgs.py wrote.
          # TODO: replace both placeholders once your EngFlow account is set up.
          export RBE_server_address="grpcs://PLACEHOLDER.cluster.engflow.com:443"
          export RBE_instance="PLACEHOLDER_ENGFLOW_INSTANCE"
          export RBE_credential_file="$ENGFLOW_CREDS"
          {
            echo "RBE_server_address=grpcs://PLACEHOLDER.cluster.engflow.com:443"
            echo "RBE_instance=PLACEHOLDER_ENGFLOW_INSTANCE"
            echo "RBE_credential_file=$ENGFLOW_CREDS"
          } >> "$GITHUB_ENV"
        fi

        e init -f --root=$(pwd) --out=Default \
          "$GN_BUILD_TYPE" --import "$GN_BUILD_TYPE" \
          --target-cpu "$TARGET_ARCH" \
          --remote-build siso

    - name: Run Electron-only hooks
      run: |
        e d gclient runhooks --spec="solutions=[{'name':'src/electron','url':None,'deps_file':'DEPS','custom_vars':{'process_deps':False},'managed':False}]"

    - name: Add CHROMIUM_BUILDTOOLS_PATH
      run: echo "CHROMIUM_BUILDTOOLS_PATH=$(pwd)/src/buildtools" >> $GITHUB_ENV

    - name: Install yarn dependencies
      uses: ./src/electron/.github/actions/install-dependencies

    - name: Check disk space before build
      run: df -h

    - name: Build Electron
      run: |
        ulimit -n 10000
        sudo launchctl limit maxfiles 65536 200000
        cd src/electron && git pack-refs && cd ../..
        cd src && e d gn clean out/Default 2>/dev/null || true && cd ..
        if [ "$GN_BUILD_TYPE" = "release" ]; then
          NINJA_SUMMARIZE_BUILD=1 e build --target electron:release_build
        else
          NINJA_SUMMARIZE_BUILD=1 e build --target electron:testing_build
        fi

    - name: Build Chromedriver
      run: |
        cd src
        e build --target electron:electron_chromedriver_zip

    - name: Upload dist artifacts
      if: always() && !cancelled()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: electron-macos-arm64
        path: |
          src/out/Default/dist.zip
          src/out/Default/chromedriver.zip

