name: Threema Electron Build

# Builds Electron with Threema's WebRTC patches for all platforms.
#
# RUNNER REQUIREMENTS:
#   This workflow requires GitHub Team/Enterprise large runners, or self-hosted
#   runners with sufficient disk space (150+ GB) and CPU (16+ cores).
#   Standard GitHub-hosted runners (14 GB disk) are NOT sufficient.
#
#   Required runner labels used below:
#     Linux:   ubuntu-22.04-16core  (~160 GB disk)
#     macOS:   macos-15-xlarge      (~30 GB disk after cleanup, M-series)
#     Windows: windows-2022-16core  (~160 GB disk)
#
#   To use self-hosted runners, replace the `runs-on` label in each job.
#
# SECRETS:
#   ENGFLOW_CREDENTIAL_JSON (optional) - EngFlow service-account credential (JSON).
#                       When set, reclient/reproxy is routed to EngFlow instead of
#                       Electron's RBE. Replace ENGFLOW_CLUSTER and ENGFLOW_INSTANCE
#                       placeholders in the "Init build configuration" step once you
#                       have an EngFlow account.
#                       When absent, the build runs locally with no remote cache.
#   CHROMIUM_GIT_COOKIE         (optional) - Raises Chromium git server rate
#   CHROMIUM_GIT_COOKIE_WINDOWS_STRING  limits. Builds work without it but
#                               may hit throttling during gclient sync.

on:
  workflow_dispatch:
    inputs:
      build-linux:
        type: boolean
        description: 'Build Linux x64'
        default: false
        required: false
      build-linux-arm64:
        type: boolean
        description: 'Build Linux arm64 (cross-compiled on x64 runner)'
        default: false
        required: false
      build-macos-arm64:
        type: boolean
        description: 'Build macOS arm64 (cross-compiled on Intel runner)'
        default: false
        required: false
      build-macos-x64:
        type: boolean
        description: 'Build macOS x64 (native on Intel runner)'
        default: false
        required: false
      build-windows:
        type: boolean
        description: 'Build Windows x64'
        default: false
        required: false
      gn-build-type:
        type: choice
        description: 'GN build type: testing (faster, larger binary) or release (optimized)'
        options:
          - testing
          - release
        default: testing
        required: false
      generate-symbols:
        type: boolean
        description: 'Generate debug symbols (significantly increases build time and artifact size)'
        default: false
        required: false
      version:
        type: string
        description: 'Release version (e.g. 40.10.0). Overrides package.json. Used for the release tag v{version}-threema and artifact names.'
        default: ''
        required: false

defaults:
  run:
    shell: bash

# Shared env for all jobs
env:
  # Keep in sync with .github/actions/build-image-sha/action.yml
  BUILD_IMAGE_SHA: daad061f4b99a0ae1c841be4aa09188280a9c8a4
  ELECTRON_OUT_DIR: Default

# ──────────────────────────────────────────────────────────────────────────────
# LINUX x64
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  linux-x64:
    name: 'Linux / x64'
    if: ${{ github.repository == 'lsmob/electron' && inputs.build-linux }}
    runs-on: [self-hosted, linux, x64]
    container:
      image: ghcr.io/electron/build:daad061f4b99a0ae1c841be4aa09188280a9c8a4
      options: --user root
    env:
      TARGET_ARCH: x64
      TARGET_PLATFORM: linux
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_arm=True --custom-var=checkout_arm64=True'
      GN_BUILD_TYPE: ${{ inputs.gn-build-type || 'testing' }}
      ENGFLOW_CREDENTIAL_JSON: ${{ secrets.ENGFLOW_CREDENTIAL_JSON }}

      CHROMIUM_GIT_COOKIE: ${{ secrets.CHROMIUM_GIT_COOKIE }}

    steps:
    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        fetch-depth: 0


    - name: Set Chromium Git Cookie
      uses: ./src/electron/.github/actions/set-chromium-cookie

    - name: Install Build Tools
      uses: ./src/electron/.github/actions/install-build-tools

    - name: Sync Chromium source and apply patches
      run: |
        e d gclient config \
          --name "src/electron" \
          --unmanaged \
          $GCLIENT_EXTRA_ARGS \
          "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
        ELECTRON_DEPOT_TOOLS_WIN_TOOLCHAIN=0 \
        DEPOT_TOOLS_WIN_TOOLCHAIN=0 \
        ELECTRON_USE_THREE_WAY_MERGE_FOR_PATCHES=1 \
          e d gclient sync --with_branch_heads --with_tags

    - name: Init build configuration
      run: |
        if [ -n "${ENGFLOW_CREDENTIAL_JSON:-}" ]; then
          echo "EngFlow credentials present — routing reclient to EngFlow RBE"
          ENGFLOW_CREDS="/tmp/engflow-creds.json"
          echo "$ENGFLOW_CREDENTIAL_JSON" > "$ENGFLOW_CREDS"
          # RBE_* env vars override whatever configure_reclient_cfgs.py wrote.
          # TODO: replace both placeholders once your EngFlow account is set up.
          export RBE_server_address="grpcs://PLACEHOLDER.cluster.engflow.com:443"
          export RBE_instance="PLACEHOLDER_ENGFLOW_INSTANCE"
          export RBE_credential_file="$ENGFLOW_CREDS"
          {
            echo "RBE_server_address=grpcs://PLACEHOLDER.cluster.engflow.com:443"
            echo "RBE_instance=PLACEHOLDER_ENGFLOW_INSTANCE"
            echo "RBE_credential_file=$ENGFLOW_CREDS"
          } >> "$GITHUB_ENV"
        fi

        e init -f --root=$(pwd) --out=Default \
          "$GN_BUILD_TYPE" --import "$GN_BUILD_TYPE" \
          --target-cpu "$TARGET_ARCH" \
          --remote-build siso

    - name: Run Electron-only hooks
      run: |
        e d gclient runhooks --spec="solutions=[{'name':'src/electron','url':None,'deps_file':'DEPS','custom_vars':{'process_deps':False},'managed':False}]"

    - name: Add CHROMIUM_BUILDTOOLS_PATH
      run: echo "CHROMIUM_BUILDTOOLS_PATH=$(pwd)/src/buildtools" >> $GITHUB_ENV

    - name: Install yarn dependencies
      uses: ./src/electron/.github/actions/install-dependencies

    - name: Build Electron
      run: |
        cd src/electron && git pack-refs && cd ../..
        # Clean if out/Default has ninja artifacts — needed once when migrating to siso.
        # Subsequent builds are incremental; RBE cache keeps this fast.
        cd src && e d gn clean out/Default 2>/dev/null || true && cd ..
        if [ "$GN_BUILD_TYPE" = "release" ]; then
          NINJA_SUMMARIZE_BUILD=1 e build --target electron:release_build
        else
          NINJA_SUMMARIZE_BUILD=1 e build --target electron:testing_build
        fi

    - name: Build Chromedriver
      run: |
        cd src
        e build --target electron:electron_chromedriver_zip

    - name: Build node headers
      run: |
        cd src
        e build --target electron:node_headers
        VERSION=$(node -p "require('./electron/package.json').version")
        tar -czf "out/Default/node-v${VERSION}-headers.tar.gz" \
          -C out/Default/gen/node_headers .

    - name: Upload dist artifacts
      if: always() && !cancelled()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: electron-linux-x64
        path: |
          src/out/Default/dist.zip
          src/out/Default/chromedriver.zip
          src/out/Default/node-v*-headers.tar.gz

# ──────────────────────────────────────────────────────────────────────────────
# LINUX arm64  (cross-compiled on x64 runner)
# ──────────────────────────────────────────────────────────────────────────────
  linux-arm64:
    name: 'Linux / arm64'
    if: ${{ github.repository == 'lsmob/electron' && inputs.build-linux-arm64 }}
    runs-on: [self-hosted, linux, x64]
    container:
      image: ghcr.io/electron/build:daad061f4b99a0ae1c841be4aa09188280a9c8a4
      options: --user root
    env:
      TARGET_ARCH: arm64
      TARGET_PLATFORM: linux
      # checkout_arm64=True pulls the arm64 sysroot needed for cross-compilation
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_arm=True --custom-var=checkout_arm64=True'
      GN_BUILD_TYPE: ${{ inputs.gn-build-type || 'testing' }}
      ENGFLOW_CREDENTIAL_JSON: ${{ secrets.ENGFLOW_CREDENTIAL_JSON }}

      CHROMIUM_GIT_COOKIE: ${{ secrets.CHROMIUM_GIT_COOKIE }}

    steps:
    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        fetch-depth: 0


    - name: Set Chromium Git Cookie
      uses: ./src/electron/.github/actions/set-chromium-cookie

    - name: Install Build Tools
      uses: ./src/electron/.github/actions/install-build-tools

    - name: Sync Chromium source and apply patches
      run: |
        e d gclient config \
          --name "src/electron" \
          --unmanaged \
