# ──────────────────────────────────────────────────────────────────────────────
# Windows x64  (native Windows runner, not cross-compiled from Linux)
# ──────────────────────────────────────────────────────────────────────────────
  windows-x64:
    name: 'Windows / x64'
    # workflow_dispatch only — no Windows runner on push until runner is available
    if: ${{ github.repository == 'lsmob/electron' && github.event_name == 'workflow_dispatch' && inputs.build-windows }}
    runs-on: [self-hosted, Windows, x64]
    env:
      TARGET_ARCH: x64
      TARGET_PLATFORM: win
      GCLIENT_EXTRA_ARGS: '--custom-var=checkout_win=True'
      GN_BUILD_TYPE: ${{ inputs.gn-build-type || 'testing' }}
      ENGFLOW_CREDENTIAL_JSON: ${{ secrets.ENGFLOW_CREDENTIAL_JSON }}

      CHROMIUM_GIT_COOKIE_WINDOWS_STRING: ${{ secrets.CHROMIUM_GIT_COOKIE_WINDOWS_STRING }}
      # Let depot_tools download the pinned MSVC toolchain
      ELECTRON_DEPOT_TOOLS_WIN_TOOLCHAIN: '1'
      DEPOT_TOOLS_WIN_TOOLCHAIN: '1'

    steps:
    - name: Configure git for Windows
      run: |
        git config --global core.filemode false
        git config --global core.autocrlf false
        git config --global core.longpaths true

    - name: Checkout Electron
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: src/electron
        fetch-depth: 0


    - name: Set Chromium Git Cookie
      uses: ./src/electron/.github/actions/set-chromium-cookie

    - name: Install Build Tools
      uses: ./src/electron/.github/actions/install-build-tools

    - name: Sync Chromium source and apply patches
      run: |
        e d gclient config \
          --name "src/electron" \
          --unmanaged \
          $GCLIENT_EXTRA_ARGS \
          "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
        # Windows builds require target_os to pull Windows-specific DEPS
        echo "target_os=['win']" >> .gclient
        ELECTRON_USE_THREE_WAY_MERGE_FOR_PATCHES=1 \
          e d gclient sync --with_branch_heads --with_tags

    - name: Fix platform-specific binaries after sync
      uses: ./src/electron/.github/actions/fix-sync
      with:
        target-platform: win

    - name: Init build configuration
      run: |
        if [ -n "${ENGFLOW_CREDENTIAL_JSON:-}" ]; then
          echo "EngFlow credentials present — routing reclient to EngFlow RBE"
          ENGFLOW_CREDS="/tmp/engflow-creds.json"
          echo "$ENGFLOW_CREDENTIAL_JSON" > "$ENGFLOW_CREDS"
          # RBE_* env vars override whatever configure_reclient_cfgs.py wrote.
          # TODO: replace both placeholders once your EngFlow account is set up.
          export RBE_server_address="grpcs://PLACEHOLDER.cluster.engflow.com:443"
          export RBE_instance="PLACEHOLDER_ENGFLOW_INSTANCE"
          export RBE_credential_file="$ENGFLOW_CREDS"
          {
            echo "RBE_server_address=grpcs://PLACEHOLDER.cluster.engflow.com:443"
            echo "RBE_instance=PLACEHOLDER_ENGFLOW_INSTANCE"
            echo "RBE_credential_file=$ENGFLOW_CREDS"
          } >> "$GITHUB_ENV"
        fi

        e init -f --root=$(pwd) --out=Default \
          "$GN_BUILD_TYPE" --import "$GN_BUILD_TYPE" \
          --target-cpu "$TARGET_ARCH" \
          --remote-build siso

    - name: Run Electron-only hooks
      run: |
        e d gclient runhooks --spec="solutions=[{'name':'src/electron','url':None,'deps_file':'DEPS','custom_vars':{'process_deps':False,'checkout_win':True},'managed':False}]"

    - name: Add CHROMIUM_BUILDTOOLS_PATH
      run: echo "CHROMIUM_BUILDTOOLS_PATH=$(pwd)/src/buildtools" >> $GITHUB_ENV

    - name: Set GN_EXTRA_ARGS for Windows
      run: |
        echo "GN_EXTRA_ARGS=win_abs_link_wrapper=\"//electron/build/win/abs_link_wrapper.py\"" >> $GITHUB_ENV

    - name: Install yarn dependencies
      uses: ./src/electron/.github/actions/install-dependencies

    - name: Build Electron (Windows)
      shell: powershell
      run: |
        cd src\electron
        git pack-refs
        cd ..\..

        cd src
        e d gn clean out/Default 2>$null
        cd ..

        $env:NINJA_SUMMARIZE_BUILD = 1
        if ($env:GN_BUILD_TYPE -eq "release") {
          e build --target electron:release_build
        } else {
          e build --target electron:testing_build
        }
        if ($LASTEXITCODE -ne 0) {
          Write-Host "e build failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }

    - name: Build Chromedriver (Windows)
      shell: powershell
      run: |
        cd src
        e build --target electron:electron_chromedriver_zip

    - name: Upload dist artifacts
      if: always() && !cancelled()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: electron-windows-x64
        path: |
          src/out/Default/dist.zip
          src/out/Default/chromedriver.zip

# ──────────────────────────────────────────────────────────────────────────────
# PUBLISH — collects all platform artifacts and creates a GitHub Release
#
# Runs only on push to main or workflow_dispatch (not on threema/** branches).
# Names artifacts to match @electron/get's expected format so Threema Desktop
# can download them with ELECTRON_MIRROR pointing at this repo's releases.
#
# Configure Threema Desktop's electron-builder / @electron/get:
#   ELECTRON_MIRROR=https://github.com/lsmob/electron/releases/download/
#   ELECTRON_CUSTOM_DIR=v{{ version }}-threema
# ──────────────────────────────────────────────────────────────────────────────
  publish:
    name: 'Publish GitHub Release'
    needs: [linux-x64, linux-arm64, macos-arm64, macos-x64, windows-x64]
    # Run if at least one build succeeded and none failed/cancelled.
    # Skipped jobs (e.g. macos-x64 which is off by default) are fine.
    if: |
      always() &&
      github.repository == 'lsmob/electron' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      contains(needs.*.result, 'success') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create/update releases

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        sparse-checkout: package.json

    - name: Get Electron version
      id: version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        fi

    - name: Download Linux x64 artifacts
      if: needs.linux-x64.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: electron-linux-x64
        path: artifacts/linux-x64

    - name: Download Linux arm64 artifacts
      if: needs.linux-arm64.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: electron-linux-arm64
        path: artifacts/linux-arm64

    - name: Download macOS arm64 artifacts
      if: needs.macos-arm64.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: electron-macos-arm64
        path: artifacts/macos-arm64

    - name: Download macOS x64 artifacts
      if: needs.macos-x64.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: electron-macos-x64
        path: artifacts/macos-x64

    - name: Download Windows x64 artifacts
      if: needs.windows-x64.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: electron-windows-x64
        path: artifacts/windows-x64

    - name: Rename artifacts to @electron/get naming convention
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        mkdir -p release-assets

        rename() {
          local src="$1" dst="$2"
          [ -f "$src" ] && cp "$src" "release-assets/$dst" || echo "Skipping $dst (not built)"
        }

        rename artifacts/linux-x64/dist.zip         "electron-v${VERSION}-linux-x64.zip"
        rename artifacts/linux-x64/chromedriver.zip  "chromedriver-v${VERSION}-linux-x64.zip"

        rename artifacts/linux-arm64/dist.zip        "electron-v${VERSION}-linux-arm64.zip"
        rename artifacts/linux-arm64/chromedriver.zip "chromedriver-v${VERSION}-linux-arm64.zip"

        rename artifacts/macos-arm64/dist.zip        "electron-v${VERSION}-darwin-arm64.zip"
        rename artifacts/macos-arm64/chromedriver.zip "chromedriver-v${VERSION}-darwin-arm64.zip"

        rename artifacts/macos-x64/dist.zip          "electron-v${VERSION}-darwin-x64.zip"
        rename artifacts/macos-x64/chromedriver.zip   "chromedriver-v${VERSION}-darwin-x64.zip"

        rename artifacts/windows-x64/dist.zip        "electron-v${VERSION}-win32-x64.zip"
        rename artifacts/windows-x64/chromedriver.zip "chromedriver-v${VERSION}-win32-x64.zip"

        # Node headers — built from source in the linux-x64 job (platform-independent).
        rename artifacts/linux-x64/node-v${VERSION}-headers.tar.gz \
          "node-v${VERSION}-headers.tar.gz"

        cd release-assets
        sha256sum * > SHASUMS256.txt
        echo "--- Release assets ---"
        ls -lh

    - name: Create or update GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="v${VERSION}-threema"
        TITLE="Electron v${VERSION} (Threema)"
        NOTES="Electron build with Threema WebRTC patches.

        **Download with \`@electron/get\`:**
        \`\`\`
        ELECTRON_MIRROR=https://github.com/lsmob/electron/releases/download/
        ELECTRON_CUSTOM_DIR=v{{ version }}-threema
        \`\`\`"

        if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
          echo "Release $TAG exists — uploading/replacing assets"
          gh release upload "$TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" --clobber
        else
          echo "Creating release $TAG"
          gh release create "$TAG" release-assets/* \
            --title "$TITLE" \
            --notes "$NOTES" \
            --repo "$GITHUB_REPOSITORY"
        fi
